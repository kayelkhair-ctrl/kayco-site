      .stroke-blue-thin{stroke:#1E63E9;stroke-width:3;stroke-linecap:round;stroke-linejoin:round;}
      .dash{stroke-dasharray:6 12;}
      .muted{stroke:#C7D0DA;stroke-width:7;stroke-linecap:round;}
      .muted2{stroke:#E3E9F0;stroke-width:8;stroke-linecap:round;}
      .card{fill:url(#pageGrad);stroke:#E3E9F0;stroke-width:1.5;filter:url(#softShadow);}
