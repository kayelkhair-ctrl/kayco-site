<svg xmlns="http://www.w3.org/2000/svg" width="1254" height="1254" viewBox="0 0 1254 1254" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">Healthcare GEO answer-ready workflow illustration</title>
  <desc id="desc">A clean vector workflow showing healthcare content becoming an answer-ready AI search result through structured data, trusted sources, internal links and checks.</desc>
